name: Deploy HTML Site

on:
  push:
    branches: ["main"] # Triggers the action every time you push to the main branch
  workflow_dispatch:   # Allows you to trigger the action manually from the Actions tab

# Set permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Pulls your HTML code from the repository into the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Bundles your directory files into a format ready for GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Location of your HTML files. Use '.' for the repository root.

      # 3. Publishes your site live to the web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
